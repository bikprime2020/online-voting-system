<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="navbar">
    <a href="/vote">Vote</a>
    <a href="/result">Results</a>
    <a href="/logout">Logout</a>
</div>

<div class="navbar">
    <a href="/vote">Vote</a>
    <a href="/result">Results</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">
    <h2>🗳️ Choose Your Candidate</h2>

    {% if voted %}
        <p style="color:red;">You already voted!</p>
    {% else %}
        <form method="post">
            {% for c in candidates %}
                <div style="margin:10px; padding:10px; border:1px solid #ccc; border-radius:8px;">
                    <input type="radio" name="candidate" value="{{c[0]}}" required>
                    <b>{{c[1]}}</b>
                </div>
            {% endfor %}

            <button type="submit">Submit Vote</button>
        </form>
    {% endif %}
</div>
</body>
</html>
